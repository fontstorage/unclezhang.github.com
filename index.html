<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <link rel="shortcut icon" href="./images/favicon.ico"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZHANG.RUN</title>
    <style>
        /* ---------- 全局重置 ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #1e1e1e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Helvetica Neue', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            padding: 20px;
        }

        /* ---------- 内容容器 ---------- */
        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            text-align: center;
        }

        /* ---------- 姓名容器 ---------- */
        .name-wrapper {
            position: relative;
            display: inline-block;
        }

        /* ---------- 姓名：Georgia Bold ---------- */
        .name {
            font-family: 'Georgia', 'Times New Roman', serif;  /* Georgia 衬线字体 */
            font-weight: 700;                                   /* Bold */
            font-size: clamp(36px, 3vw, 70px);
            letter-spacing: 0.04em;
            line-height: 1.1;
            color: #ffffff;
            text-transform: uppercase;
            display: inline-block;
        }

        /* ---------- 下划线 + 渐变 ---------- */
        .name-wrapper::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 160%;
            height: 2px;
            background: linear-gradient(to right, 
                rgba(255, 255, 255, 0) 0%, 
                rgba(255, 255, 255, 1) 30%, 
                rgba(255, 255, 255, 1) 70%, 
                rgba(255, 255, 255, 0) 100%
            );
            border-radius: 2px;
        }

        /* ---------- 邮箱 ---------- */
        .email {
            font-size: clamp(9px, 1.6vw, 16px);
            font-weight: 400;
            letter-spacing: 0.02em;
            color: #ffffff;
            text-decoration: none;
            margin-top: 0.8rem;
        }

        /* ---------- 小屏适配 ---------- */
        @media (max-width: 480px) {
            .name {
                font-size: 28px;
            }
            .email {
                font-size: 12px;
            }
            .name-wrapper::after {
                bottom: -4px;
                height: 2px;
            }
        }

        @media (max-width: 360px) {
            .name {
                font-size: 20px;
            }
            .email {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="content">
        <div class="name-wrapper">
            <span class="name">ZHANG</span>
        </div>
        <div class="email">hello@zhang.run</div>
    </div>

</body>
</html>
